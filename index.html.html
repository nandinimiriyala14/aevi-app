<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Aevi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#E2DDD6;}
body{display:flex;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;}
#app{width:100%;max-width:390px;min-height:100svh;background:#EEEAE3;display:flex;flex-direction:column;overflow:hidden;position:relative;}
input,textarea{outline:none;font-family:'Plus Jakarta Sans',sans-serif;}
button{cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:none;}
.screen{flex:1;display:flex;flex-direction:column;min-height:100svh;background:#EEEAE3;}
@keyframes sR{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes sL{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
@keyframes fI{from{opacity:0}to{opacity:1}}
@keyframes fU{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes breathe{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.06)}}
@keyframes dotP{0%,100%{opacity:.2;transform:scale(.6)}50%{opacity:1;transform:scale(1)}}
input::placeholder{color:#BABCBF;}
textarea::placeholder{color:#BABCBF;}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body><div id="app"></div>
<script>
/* ── PALETTE from Figma ── */
const C={
  bg:'#EEEAE3',        // warm cream
  card:'#FFFFFF',       // white cards
  border:'#E8E4DC',     // card borders
  dark:'#1C2B3A',       // deep navy — headings, buttons, orb
  darkM:'rgba(28,43,58,0.55)', // muted dark
  darkH:'rgba(28,43,58,0.35)', // hint dark
  text:'#1C2B3A',
  textS:'#4A5568',
  textM:'#6B7280',
  textH:'#9CA3AF',
  green:'#4CAF80',
  selected:'#1C2B3A',
};
const SF="'Cormorant Garamond',Georgia,serif";
const SS="'Plus Jakarta Sans',sans-serif";
const BACKEND='https://aevi-backend.vercel.app';
const ORDER=['welcome','signup','onboarding','persona','home','chat','insights','upgrade'];

const state={
  screen:'welcome',
  user:{name:'',goal:'',tone:'',topics:[]},
  msgs:[],mem:[],loading:false,
  token:localStorage.getItem('aevi_token')||null,
};

async function load(k){try{const r=await window.storage?.get(k);return r?JSON.parse(r.value):null}catch{return null}}
async function save(k,v){try{await window.storage?.set(k,JSON.stringify(v))}catch{}}

async function init(){
  const[u,m,msgs]=await Promise.all([load('av_u'),load('av_m'),load('av_msgs')]);
  if(u){state.user=u;state.screen='home';}
  if(m)state.mem=m;if(msgs)state.msgs=msgs;
  render('fI');
}

function go(s,dir){
  if(!dir){const pi=ORDER.indexOf(state.screen),ci=ORDER.indexOf(s);dir=s==='welcome'?'sL':ci>pi?'sR':ci<pi?'sL':'fI';}
  state.screen=s;render(dir);window.scrollTo(0,0);
}

function render(dir='sR'){
  const app=document.getElementById('app');
  const screens={welcome,signup,onboarding,persona,home,chat,insights,upgrade};
  const e=screens[state.screen]?.();
  if(!e)return;
  e.style.animation=`${dir} .24s cubic-bezier(.4,0,.2,1) forwards`;
  app.innerHTML='';app.appendChild(e);
}

function el(tag,a,...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(a||{})){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='class')e.className=v;
    else e.setAttribute(k,v);
  }
  kids.forEach(c=>{if(c==null)return;e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}
const d=(a,...c)=>el('div',a,...c);
const b=(a,...c)=>el('button',a,...c);
const p=(a,...c)=>el('p',a,...c);
const h=(n,a,...c)=>el('h'+n,a,...c);
const s=(a,...c)=>el('span',a,...c);
const inp=(a)=>el('input',a);

/* ── SHARED COMPONENTS ── */

// Back button — circle with arrow
function backBtn(to,light=false){
  return b({onClick:()=>go(to,'sL'),style:{
    width:'40px',height:'40px',borderRadius:'50%',
    background:light?'rgba(255,255,255,0.12)':C.card,
    border:`1px solid ${light?'rgba(255,255,255,0.2)':C.border}`,
    display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:'16px',color:light?'rgba(255,255,255,0.8)':C.dark,
    marginBottom:'32px',flexShrink:'0',
    boxShadow:light?'none':'0 1px 3px rgba(0,0,0,0.06)',
  }},'←');
}

// Primary button — from Figma: dark fill, rounded rect, arrow inside
function primBtn(label,onClick){
  const btn=b({onClick,style:{
    width:'100%',height:'56px',borderRadius:'16px',
    background:C.dark,color:'#FFFFFF',
    fontSize:'15px',fontWeight:'600',fontFamily:SS,
    display:'flex',alignItems:'center',justifyContent:'center',gap:'12px',
    boxShadow:'0 4px 20px rgba(28,43,58,0.22)',
    transition:'transform .13s,box-shadow .13s',
    letterSpacing:'.01em',
  }});
  btn.appendChild(s({style:{flex:'1',textAlign:'center'}},label));
  btn.appendChild(d({style:{width:'32px',height:'32px',borderRadius:'10px',background:'rgba(255,255,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'15px',color:'rgba(255,255,255,0.8)',marginRight:'4px'}},'→'));
  btn.addEventListener('mouseover',()=>{btn.style.transform='translateY(-1px)';btn.style.boxShadow='0 8px 28px rgba(28,43,58,0.28)';});
  btn.addEventListener('mouseout',()=>{btn.style.transform='';btn.style.boxShadow='0 4px 20px rgba(28,43,58,0.22)';});
  return btn;
}

// Ghost button — white bg, border
function ghostBtn(label,onClick){
  return b({onClick,style:{
    width:'100%',height:'52px',borderRadius:'16px',
    background:C.card,color:C.dark,
    fontSize:'14px',fontWeight:'500',fontFamily:SS,
    border:`1.5px solid ${C.border}`,
    boxShadow:'0 1px 3px rgba(0,0,0,0.04)',
    transition:'all .14s',
  }},label);
}

// White card
function card(style={}){
  return d({style:{background:C.card,borderRadius:'16px',border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.04)',...style}});
}

// Section label
function sectionLbl(text){
  return p({style:{fontSize:'11px',fontWeight:'600',color:C.textH,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'12px',fontFamily:SS}},text);
}

// Bottom nav — from Figma: white bg, icons + labels, active has bg highlight
function navBar(active){
  const nav=d({style:{
    position:'fixed',bottom:'0',left:'50%',transform:'translateX(-50%)',
    width:'100%',maxWidth:'390px',
    background:'rgba(238,234,227,0.95)',
    backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
    borderTop:`1px solid ${C.border}`,
    display:'flex',padding:'8px 8px 26px',zIndex:'20',
  }});
  const icons={home:'⌂',chat:'✦',insights:'◎',upgrade:'↑'};
  ['home','chat','insights','upgrade'].forEach(sc=>{
    const isA=active===sc;
    const lbl=sc.charAt(0).toUpperCase()+sc.slice(1);
    const btn=b({onClick:()=>go(sc,'fI'),style:{
      flex:'1',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',
      background:isA?'rgba(28,43,58,0.08)':'transparent',
      borderRadius:'12px',padding:'8px 4px',transition:'all .18s',
    }},
    s({style:{fontSize:'18px',color:isA?C.dark:C.textH,transition:'color .18s'}},icons[sc]),
    s({style:{fontSize:'10px',color:isA?C.dark:C.textH,fontWeight:isA?'600':'400',fontFamily:SS}},lbl)
    );
    nav.appendChild(btn);
  });
  return nav;
}

// Progress dots
function progDots(cur,total=3){
  const w=d({style:{display:'flex',gap:'6px',alignItems:'center'}});
  for(let i=0;i<total;i++)w.appendChild(d({style:{height:'4px',borderRadius:'2px',transition:'all .3s',width:i===cur?'28px':'8px',background:i===cur?C.dark:'rgba(28,43,58,0.2)'}}));
  return w;
}

/* ══════════════════════════════
   1. WELCOME
══════════════════════════════ */
function welcome(){
  const sc=d({class:'screen',style:{overflow:'hidden',position:'relative',justifyContent:'space-between'}});

  // Subtle radial glow behind orb
  sc.appendChild(d({style:{position:'absolute',top:'60px',left:'50%',transform:'translateX(-50%)',width:'280px',height:'280px',borderRadius:'50%',background:'radial-gradient(circle,rgba(28,43,58,0.05) 0%,transparent 70%)',pointerEvents:'none'}}));

  const hero=d({style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'80px 32px 40px',textAlign:'center'}});

  // Orb — dark navy circle, sparkle icon, breathing rings
  const orbW=d({style:{position:'relative',width:'96px',height:'96px',margin:'0 auto 36px'}});
  orbW.appendChild(d({style:{position:'absolute',inset:'-14px',borderRadius:'50%',border:'1px solid rgba(28,43,58,0.07)',animation:'breathe 3.5s ease-in-out infinite'}}));
  const orb=d({style:{
    width:'100%',height:'100%',borderRadius:'50%',
    background:`radial-gradient(135deg at 35% 35%, #2D3E50, ${C.dark})`,
    display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:'36px',color:'rgba(255,255,255,0.9)',
    boxShadow:'0 16px 48px rgba(28,43,58,0.3)',
    animation:'float 5.5s ease-in-out infinite',
  }},'✦');
  orbW.appendChild(orb);
  hero.appendChild(orbW);

  hero.appendChild(h(1,{style:{fontFamily:SF,fontSize:'72px',fontStyle:'italic',fontWeight:'400',color:C.dark,letterSpacing:'-.04em',lineHeight:'.88',marginBottom:'14px'}},'Aevi'));
  hero.appendChild(p({style:{fontFamily:SS,fontSize:'16px',fontWeight:'400',color:C.textM,lineHeight:'1.6',marginBottom:'32px'}},'Your private second mind'));

  // Feature pills — from Figma: white bg, border, rounded pill
  const pills=d({style:{display:'flex',gap:'8px',justifyContent:'center',flexWrap:'wrap'}});
  ['Remembers you','Thinks with you','Stays private'].forEach(t=>{
    pills.appendChild(d({style:{
      padding:'8px 16px',borderRadius:'100px',
      background:C.card,border:`1px solid ${C.border}`,
      fontSize:'12px',color:C.dark,fontWeight:'500',fontFamily:SS,
      boxShadow:'0 1px 3px rgba(0,0,0,0.04)',
    }},t));
  });
  hero.appendChild(pills);
  sc.appendChild(hero);

  const bottom=d({style:{padding:'0 24px 48px',display:'flex',flexDirection:'column',gap:'10px'}});
  bottom.appendChild(primBtn('Begin your journey',()=>go('signup','sR')));
  bottom.appendChild(ghostBtn('I already have an account',()=>go('home','sR')));
  sc.appendChild(bottom);
  return sc;
}

/* ══════════════════════════════
   2. SIGN UP
══════════════════════════════ */
function signup(){
  const sc=d({class:'screen',style:{overflowY:'auto'}});
  const wrap=d({style:{padding:'60px 24px 48px',display:'flex',flexDirection:'column',flex:'1'}});
  wrap.appendChild(backBtn('welcome'));

  // Large serif heading — exactly as Figma
  wrap.appendChild(h(2,{style:{fontFamily:SF,fontSize:'52px',fontWeight:'500',color:C.dark,lineHeight:'1.0',marginBottom:'10px'}},'Create your\nprivate space'));
  wrap.appendChild(p({style:{fontSize:'15px',color:C.textM,lineHeight:'1.6',marginBottom:'40px',fontFamily:SS}},'Your thoughts stay here. Always.'));

  let nV='',eV='',pV='';
  [['YOUR NAME','text','What should I call you?',v=>nV=v],
   ['EMAIL','email','you@example.com',v=>eV=v],
   ['PASSWORD','password','••••••••',v=>pV=v]].forEach(([lbl,type,ph,cb])=>{
    const fw=d({style:{marginBottom:'20px'}});
    fw.appendChild(p({style:{fontSize:'11px',color:C.textM,fontWeight:'600',letterSpacing:'.09em',textTransform:'uppercase',marginBottom:'8px',fontFamily:SS}},lbl));
    const i=inp({type,placeholder:ph,style:{
      width:'100%',padding:'16px 18px',borderRadius:'14px',
      border:`1px solid ${C.border}`,background:C.card,
      color:C.dark,fontSize:'15px',fontFamily:SS,
      boxShadow:'0 1px 4px rgba(0,0,0,0.04)',
      transition:'border-color .18s,box-shadow .18s',
    }});
    i.addEventListener('focus',()=>{i.style.borderColor=C.dark;i.style.boxShadow=`0 0 0 3px rgba(28,43,58,0.08)`;});
    i.addEventListener('blur',()=>{i.style.borderColor=C.border;i.style.boxShadow='0 1px 4px rgba(0,0,0,0.04)';});
    i.addEventListener('input',e=>cb(e.target.value));
    fw.appendChild(i);wrap.appendChild(fw);
  });

  wrap.appendChild(d({style:{flex:'1',minHeight:'24px'}}));
  wrap.appendChild(primBtn('Continue',()=>{if(nV.trim()){state.user.name=nV.trim();go('onboarding','sR');}}));
  wrap.appendChild(d({style:{height:'14px'}}));
  const note=p({style:{textAlign:'center',fontSize:'12px',color:C.textH,fontFamily:SS}});
  note.innerHTML=`By continuing you agree to our <span style="color:${C.dark};text-decoration:underline;cursor:pointer">Privacy Policy</span>`;
  wrap.appendChild(note);
  sc.appendChild(wrap);return sc;
}

/* ══════════════════════════════
   3. ONBOARDING — Goal selection
══════════════════════════════ */
function onboarding(){
  const sc=d({class:'screen',style:{overflowY:'auto'}});
  const wrap=d({style:{padding:'60px 24px 48px',display:'flex',flexDirection:'column',flex:'1'}});
  wrap.appendChild(backBtn('signup'));

  wrap.appendChild(h(2,{style:{fontFamily:SF,fontSize:'52px',fontWeight:'500',color:C.dark,lineHeight:'1.0',marginBottom:'10px'}},'What brings\nyou here?'));
  wrap.appendChild(p({style:{fontSize:'15px',color:C.textM,lineHeight:'1.6',marginBottom:'32px',fontFamily:SS}},"I'll shape how I think around your goal."));

  let sel='';
  const goals=[
    {id:'reflect',icon:'◎',label:'Self-reflection',sub:'Process thoughts and understand myself'},
    {id:'decide',icon:'⊙',label:'Better decisions',sub:'Think through choices with clarity'},
    {id:'create',icon:'✦',label:'Creative writing',sub:'Turn raw ideas into polished content'},
    {id:'journal',icon:'◇',label:'Daily journaling',sub:'Build a consistent reflection habit'},
  ];

  const cards=goals.map(g=>{
    const card=b({style:{
      width:'100%',padding:'18px 20px',
      borderRadius:'16px',
      border:`1px solid ${C.border}`,
      background:C.card,textAlign:'left',marginBottom:'10px',
      display:'flex',alignItems:'center',gap:'16px',
      boxShadow:'0 1px 4px rgba(0,0,0,0.04)',
      transition:'all .15s',
    }});
    const ico=d({style:{
      width:'48px',height:'48px',borderRadius:'14px',
      background:'#F4F1EB',border:`1px solid ${C.border}`,
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:'20px',color:C.textM,flexShrink:'0',transition:'all .15s',
    }},g.icon);
    const txt=d({style:{flex:'1'}});
    txt.appendChild(d({style:{fontSize:'15px',fontWeight:'600',color:C.dark,marginBottom:'3px',fontFamily:SS}},g.label));
    txt.appendChild(d({style:{fontSize:'13px',color:C.textM,lineHeight:'1.4',fontFamily:SS}},g.sub));
    const chk=d({style:{
      width:'24px',height:'24px',borderRadius:'50%',
      border:`1.5px solid ${C.border}`,flexShrink:'0',
      transition:'all .15s',display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:'12px',color:'transparent',
    }});
    card.append(ico,txt,chk);
    card.addEventListener('click',()=>{
      sel=g.id;
      cards.forEach(c=>{
        c.style.border=`1px solid ${C.border}`;c.style.background=C.card;c.style.boxShadow='0 1px 4px rgba(0,0,0,0.04)';
        c.firstChild.style.background='#F4F1EB';c.firstChild.style.color=C.textM;c.firstChild.style.border=`1px solid ${C.border}`;
        c.lastChild.style.background='transparent';c.lastChild.style.border=`1.5px solid ${C.border}`;c.lastChild.style.color='transparent';c.lastChild.textContent='';
      });
      card.style.border=`1.5px solid ${C.dark}`;card.style.background='#FFFFFF';card.style.boxShadow=`0 4px 16px rgba(28,43,58,0.1)`;
      ico.style.background=C.dark;ico.style.color='#FFFFFF';ico.style.border=`1px solid ${C.dark}`;
      chk.style.background=C.dark;chk.style.border=`1.5px solid ${C.dark}`;chk.style.color='#FFFFFF';chk.textContent='✓';
    });
    return card;
  });
  cards.forEach(c=>wrap.appendChild(c));
  wrap.appendChild(d({style:{flex:'1',minHeight:'20px'}}));

  const bot=d({style:{display:'flex',alignItems:'center',justifyContent:'space-between'}});
  bot.appendChild(progDots(0));
  const nb=b({onClick:()=>{if(sel){state.user.goal=sel;go('persona','sR');}},style:{
    height:'52px',padding:'0 28px',borderRadius:'16px',
    background:C.dark,color:'#FFFFFF',
    fontSize:'15px',fontWeight:'600',fontFamily:SS,
    display:'flex',alignItems:'center',gap:'10px',
    boxShadow:`0 4px 16px rgba(28,43,58,0.22)`,
  }},'Next ',s({style:{fontSize:'16px'}},'→'));
  bot.appendChild(nb);wrap.appendChild(bot);sc.appendChild(wrap);return sc;
}

/* ══════════════════════════════
   4. PERSONA — Voice & topics
══════════════════════════════ */
function persona(){
  const sc=d({class:'screen',style:{overflowY:'auto'}});
  const wrap=d({style:{padding:'60px 24px 48px',display:'flex',flexDirection:'column',flex:'1'}});
  wrap.appendChild(backBtn('onboarding'));

  wrap.appendChild(h(2,{style:{fontFamily:SF,fontSize:'52px',fontWeight:'500',color:C.dark,lineHeight:'1.0',marginBottom:'10px'}},'Shape\nmy voice'));
  wrap.appendChild(p({style:{fontSize:'15px',color:C.textM,lineHeight:'1.6',marginBottom:'28px',fontFamily:SS}},'How should I sound when I talk to you?'));

  let tone='';const selT=[];
  const grid=d({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'28px'}});
  const tones=[{id:'warm',l:'Warm & gentle'},{id:'direct',l:'Direct & honest'},{id:'curious',l:'Curious & deep'},{id:'calm',l:'Calm & grounding'}];
  const tBtns=tones.map(t=>{
    const btn=b({style:{
      padding:'18px 14px',borderRadius:'16px',
      border:`1px solid ${C.border}`,background:C.card,
      color:C.textS,fontSize:'14px',fontFamily:SS,fontWeight:'500',
      boxShadow:'0 1px 4px rgba(0,0,0,0.04)',
      transition:'all .14s',textAlign:'center',
    }},t.l);
    btn.addEventListener('click',()=>{
      tone=t.id;
      tBtns.forEach(x=>{x.style.border=`1px solid ${C.border}`;x.style.background=C.card;x.style.color=C.textS;});
      btn.style.border=`1.5px solid ${C.dark}`;btn.style.background=C.dark;btn.style.color='#FFFFFF';
    });
    return btn;
  });
  tBtns.forEach(b=>grid.appendChild(b));wrap.appendChild(grid);

  wrap.appendChild(p({style:{fontSize:'15px',fontWeight:'600',color:C.dark,marginBottom:'14px',fontFamily:SS}},"Topics you'd like to explore"));
  const tagW=d({style:{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'40px'}});
  ['Work & career','Relationships','Creativity','Health','Purpose','Decisions','Emotions','Ideas'].forEach(t=>{
    const tg=b({style:{
      padding:'9px 18px',borderRadius:'100px',
      border:`1px solid ${C.border}`,background:C.card,
      color:C.textS,fontSize:'13px',fontFamily:SS,fontWeight:'500',
      boxShadow:'0 1px 3px rgba(0,0,0,0.04)',
      transition:'all .14s',
    }},t);
    tg.addEventListener('click',()=>{
      if(selT.includes(t)){selT.splice(selT.indexOf(t),1);tg.style.border=`1px solid ${C.border}`;tg.style.background=C.card;tg.style.color=C.textS;}
      else{selT.push(t);tg.style.border=`1.5px solid ${C.dark}`;tg.style.background=C.dark;tg.style.color='#FFFFFF';}
    });
    tagW.appendChild(tg);
  });
  wrap.appendChild(tagW);
  wrap.appendChild(d({style:{flex:'1',minHeight:'12px'}}));

  const bot=d({style:{display:'flex',alignItems:'center',justifyContent:'space-between'}});
  bot.appendChild(progDots(2));
  const nb=b({onClick:async()=>{
    if(!tone)return;
    state.user.tone=tone;state.user.topics=[...selT];
    await save('av_u',state.user);go('home','sR');
  },style:{height:'52px',padding:'0 28px',borderRadius:'16px',background:C.dark,color:'#FFFFFF',fontSize:'15px',fontWeight:'600',fontFamily:SS,display:'flex',alignItems:'center',gap:'10px',boxShadow:`0 4px 16px rgba(28,43,58,0.22)`}},'Meet Aevi ',s({style:{fontSize:'16px'}},'→'));
  bot.appendChild(nb);wrap.appendChild(bot);sc.appendChild(wrap);return sc;
}

/* ══════════════════════════════
   5. HOME
══════════════════════════════ */
function home(){
  const sc=d({class:'screen'});
  const hour=new Date().getHours();
  const greet=hour<5?'Good night':hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';

  // Header — flat, no card
  const hdr=d({style:{padding:'56px 24px 20px',borderBottom:`1px solid ${C.border}`,background:C.bg}});
  const hrow=d({style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}});
  const hL=d({});
  hL.appendChild(p({style:{fontSize:'13px',color:C.textM,marginBottom:'4px',fontFamily:SS}},greet));
  hL.appendChild(h(2,{style:{fontFamily:SF,fontSize:'38px',fontWeight:'500',color:C.dark,lineHeight:'1.0'}},(state.user.name||'Friend')));
  const hR=d({style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'8px'}});
  hR.appendChild(b({onClick:()=>go('upgrade','sR'),style:{
    padding:'7px 16px',borderRadius:'100px',
    background:C.card,border:`1px solid ${C.border}`,
    color:C.dark,fontSize:'12px',fontFamily:SS,fontWeight:'600',
    boxShadow:'0 1px 4px rgba(0,0,0,0.06)',
  }},'Free'));
  hR.appendChild(b({onClick:async()=>{
    await save('av_u',null);await save('av_m',null);await save('av_msgs',null);
    state.user={name:'',goal:'',tone:'',topics:[]};state.mem=[];state.msgs=[];go('welcome','sL');
  },style:{background:'none',border:'none',fontSize:'12px',color:C.textH,fontFamily:SS,textDecoration:'underline'}},'Sign out'));
  hrow.append(hL,hR);hdr.appendChild(hrow);sc.appendChild(hdr);

  const body=d({style:{flex:'1',overflowY:'auto',padding:'24px 20px 110px',background:C.bg}});

  // Memory card — white card with left accent border (exactly from Figma)
  if(state.mem.length>0){
    const mc=d({style:{
      background:C.card,borderRadius:'16px',
      border:`1px solid ${C.border}`,
      borderLeft:`3px solid ${C.dark}`,
      padding:'18px 20px',marginBottom:'24px',
      boxShadow:'0 1px 6px rgba(0,0,0,0.05)',
    }});
    mc.appendChild(p({style:{fontSize:'10px',color:C.textH,letterSpacing:'.09em',textTransform:'uppercase',marginBottom:'8px',fontFamily:SS,fontWeight:'600'}},'AEVI REMEMBERS'));
    mc.appendChild(p({style:{fontFamily:SS,fontSize:'15px',color:C.dark,lineHeight:'1.6'}},'"'+state.mem[state.mem.length-1].value+'"'));
    body.appendChild(mc);
  }

  body.appendChild(sectionLbl('Start here'));

  // Prompt cards — white cards, from Figma
  const pgrid=d({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'24px'}});
  const prompts=[
    {q:"What's weighing on your mind?",featured:true,sub:'→ Explore'},
    {q:"Any decisions?",featured:false},
    {q:"A feeling today?",featured:false},
  ];
  prompts.forEach(({q,featured,sub})=>{
    const pc=b({onClick:()=>go('chat','sR'),style:{
      gridColumn:featured?'span 2':'span 1',
      padding:featured?'20px':'18px 16px',
      borderRadius:'16px',border:`1px solid ${C.border}`,
      background:C.card,textAlign:'left',
      boxShadow:'0 1px 4px rgba(0,0,0,0.04)',
      transition:'all .14s',
    }});
    pc.appendChild(p({style:{fontSize:featured?'15px':'13px',fontWeight:'600',color:C.dark,lineHeight:'1.4',marginBottom:sub?'8px':'0',fontFamily:SS}},q));
    if(sub)pc.appendChild(s({style:{fontSize:'13px',color:C.textM,fontFamily:SS}},sub));
    pc.addEventListener('mouseover',()=>{pc.style.borderColor=C.dark;pc.style.transform='translateY(-1px)';pc.style.boxShadow='0 4px 14px rgba(28,43,58,0.1)';});
    pc.addEventListener('mouseout',()=>{pc.style.borderColor=C.border;pc.style.transform='';pc.style.boxShadow='0 1px 4px rgba(0,0,0,0.04)';});
    pgrid.appendChild(pc);
  });
  body.appendChild(pgrid);

  // Stats — white cards
  const stats=d({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'20px'}});
  [{l:'Memories',v:state.mem.length},{l:'Days active',v:1}].forEach(stat=>{
    const sc2=d({style:{background:C.card,borderRadius:'16px',padding:'18px 16px',border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}});
    sc2.appendChild(p({style:{fontFamily:SF,fontSize:'48px',fontWeight:'400',color:C.dark,lineHeight:'1'}},String(stat.v)));
    sc2.appendChild(p({style:{fontSize:'12px',color:C.textM,marginTop:'4px',fontFamily:SS}},stat.l));
    stats.appendChild(sc2);
  });
  body.appendChild(stats);

  // Streak card
  const streak=d({style:{background:C.card,borderRadius:'16px',padding:'18px',border:`1px solid ${C.border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}});
  streak.appendChild(p({style:{fontSize:'14px',fontWeight:'600',color:C.dark,marginBottom:'14px',fontFamily:SS}},'Reflection streak'));
  const days=d({style:{display:'flex',gap:'6px'}});
  const today=new Date().getDay();
  ['M','T','W','T','F','S','S'].forEach((day,i)=>{
    const isT=i===(today===0?6:today-1);
    const dc=d({style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',gap:'5px'}});
    dc.appendChild(d({style:{
      width:'100%',aspectRatio:'1',borderRadius:'10px',
      background:isT?C.dark:'rgba(28,43,58,0.07)',
      display:'flex',alignItems:'center',justifyContent:'center',
    }},isT?s({style:{fontSize:'10px',color:'#FFFFFF',fontWeight:'700',fontFamily:SS}},day):''));
    if(!isT)dc.appendChild(s({style:{fontSize:'10px',color:C.textH,fontFamily:SS}},day));
    days.appendChild(dc);
  });
  streak.appendChild(days);body.appendChild(streak);
  sc.append(body,navBar('home'));return sc;
}

/* ══════════════════════════════
   6. CHAT
══════════════════════════════ */
function chat(){
  const sc=d({class:'screen',style:{display:'flex',flexDirection:'column'}});

  // Header
  const hdr=d({style:{
    padding:'52px 20px 16px',background:C.bg,
    borderBottom:`1px solid ${C.border}`,flexShrink:'0',
    display:'flex',flexDirection:'column',alignItems:'center',position:'relative',
  }});
  hdr.appendChild(b({onClick:()=>go('home','sL'),style:{
    position:'absolute',left:'20px',top:'56px',
    width:'38px',height:'38px',borderRadius:'50%',
    background:C.card,border:`1px solid ${C.border}`,
    display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:'16px',color:C.dark,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',
  }},'←'));

  const av=d({style:{
    width:'52px',height:'52px',borderRadius:'50%',
    background:C.dark,display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:'20px',color:'rgba(255,255,255,0.9)',
    boxShadow:'0 6px 20px rgba(28,43,58,0.22)',
    marginBottom:'8px',position:'relative',
  }},'✦');
  av.appendChild(d({style:{position:'absolute',bottom:'2px',right:'2px',width:'12px',height:'12px',borderRadius:'50%',background:C.green,border:`2px solid ${C.bg}`}}));
  hdr.appendChild(av);
  hdr.appendChild(d({style:{fontSize:'16px',fontWeight:'600',color:C.dark,fontFamily:SS}},'Aevi'));
  hdr.appendChild(d({style:{fontSize:'13px',color:C.textM,fontFamily:SS,marginTop:'2px'}},'your second mind'));
  sc.appendChild(hdr);

  const msgsArea=d({style:{flex:'1',overflowY:'auto',padding:'20px 16px 8px',background:C.bg}});

  function renderMsgs(){
    msgsArea.innerHTML='';
    if(state.msgs.length===0){
      const empty=d({style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'56vh',padding:'24px',textAlign:'center'}});
      const ew=d({style:{position:'relative',width:'84px',height:'84px',margin:'0 auto 28px'}});
      ew.appendChild(d({style:{position:'absolute',inset:'-12px',borderRadius:'50%',border:'1px solid rgba(28,43,58,0.08)',animation:'breathe 3.5s ease-in-out infinite'}}));
      const orbE=d({style:{width:'100%',height:'100%',borderRadius:'50%',background:C.dark,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'28px',color:'rgba(255,255,255,0.9)',boxShadow:'0 12px 36px rgba(28,43,58,0.2)',animation:'float 5.5s ease-in-out infinite'}},'✦');
      ew.appendChild(orbE);empty.appendChild(ew);
      empty.appendChild(h(3,{style:{fontFamily:SF,fontSize:'32px',color:C.dark,marginBottom:'10px',fontWeight:'400',fontStyle:'italic'}},"What's on your mind?"));
      empty.appendChild(p({style:{fontSize:'14px',color:C.textM,lineHeight:'1.7',marginBottom:'32px',maxWidth:'240px',fontFamily:SS}},'A thought, a feeling, a decision — bring it here.'));
      const pw=d({style:{display:'flex',flexDirection:'column',gap:'8px',width:'100%',maxWidth:'280px'}});
      ["I've been thinking about...","I need to decide...","Something's been bothering me...","I had an idea today..."].forEach(pr=>{
        pw.appendChild(b({onClick:()=>{ta.value=pr;ta.dispatchEvent(new Event('input'));ta.focus();},style:{
          background:C.card,border:`1px solid ${C.border}`,
          color:C.dark,borderRadius:'14px',padding:'13px 16px',
          fontSize:'13px',fontFamily:SS,textAlign:'left',
          boxShadow:'0 1px 4px rgba(0,0,0,0.04)',
          transition:'all .14s',fontWeight:'500',
        }},pr));
      });
      empty.appendChild(pw);msgsArea.appendChild(empty);
    } else {
      const sEl=document.createElement('style');
      sEl.textContent=`@keyframes fU{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}`;
      document.head.appendChild(sEl);
      state.msgs.forEach((msg,idx)=>{
        const isU=msg.role==='user';
        const wrap=d({style:{display:'flex',flexDirection:isU?'row-reverse':'row',gap:'10px',alignItems:'flex-end',marginBottom:'16px',animation:`fU .22s ease forwards`,animationDelay:`${Math.min(idx,4)*0.04}s`,opacity:'0'}});
        if(!isU){
          wrap.appendChild(d({style:{width:'30px',height:'30px',borderRadius:'50%',background:C.dark,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',color:'rgba(255,255,255,0.9)',flexShrink:'0',boxShadow:'0 2px 8px rgba(28,43,58,0.15)'}},'✦'));
        }
        const inner=d({style:{maxWidth:'78%'}});
        const lbl=d({style:{fontSize:'11px',color:C.textH,marginBottom:'4px',fontFamily:SS,display:'flex',alignItems:'center',gap:'6px',flexDirection:isU?'row-reverse':'row'}});
        lbl.append(s({},isU?'You':'Aevi'),s({style:{opacity:'.7'}},new Date(msg.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})));
        inner.appendChild(lbl);
        const bubble=d({style:{
          background:isU?C.dark:C.card,
          border:isU?'none':`1px solid ${C.border}`,
          borderRadius:isU?'20px 20px 4px 20px':'20px 20px 20px 4px',
          padding:'13px 17px',color:isU?'#FFFFFF':C.dark,
          fontSize:'14px',lineHeight:'1.75',whiteSpace:'pre-wrap',fontFamily:SS,
          boxShadow:isU?'0 4px 14px rgba(28,43,58,0.18)':'0 1px 4px rgba(0,0,0,0.05)',
        }},msg.content);
        inner.appendChild(bubble);wrap.appendChild(inner);msgsArea.appendChild(wrap);
      });
      if(state.loading){
        const wrap=d({style:{display:'flex',gap:'10px',alignItems:'flex-end',marginBottom:'16px'}});
        wrap.appendChild(d({style:{width:'30px',height:'30px',borderRadius:'50%',background:C.dark,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',color:'rgba(255,255,255,0.9)',flexShrink:'0'}},'✦'));
        const dots=d({style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:'20px 20px 20px 4px',padding:'13px 18px',display:'flex',gap:'6px',boxShadow:'0 1px 4px rgba(0,0,0,0.05)'}});
        [0,1,2].forEach(i=>{const dot=d({style:{width:'7px',height:'7px',borderRadius:'50%',background:C.textM,animation:'dotP 1.2s ease-in-out infinite',animationDelay:i*0.2+'s'}});dots.appendChild(dot);});
        wrap.appendChild(dots);msgsArea.appendChild(wrap);
      }
      setTimeout(()=>msgsArea.lastElementChild?.scrollIntoView({behavior:'smooth'}),50);
    }
  }
  const sEl=document.createElement('style');
  sEl.textContent=`@keyframes fU{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}`;
  document.head.appendChild(sEl);
  renderMsgs();sc.appendChild(msgsArea);

  // Input bar — from Figma: white rounded rect, dark send button
  const inputBar=d({style:{padding:'12px 16px 28px',background:C.bg,borderTop:`1px solid ${C.border}`,flexShrink:'0'}});
  const inputWrap=d({style:{
    display:'flex',gap:'10px',alignItems:'flex-end',
    background:C.card,border:`1px solid ${C.border}`,
    borderRadius:'18px',padding:'10px 10px 10px 18px',
    boxShadow:'0 1px 6px rgba(0,0,0,0.06)',
    transition:'border-color .18s,box-shadow .18s',
  }});
  inputWrap.addEventListener('focusin',()=>{inputWrap.style.borderColor=C.dark;inputWrap.style.boxShadow=`0 0 0 3px rgba(28,43,58,0.08)`;});
  inputWrap.addEventListener('focusout',()=>{inputWrap.style.borderColor=C.border;inputWrap.style.boxShadow='0 1px 6px rgba(0,0,0,0.06)';});

  const ta=el('textarea',{placeholder:'A thought, a question, anything...',rows:'1',style:{
    flex:'1',border:'none',background:'transparent',color:C.dark,
    fontSize:'14px',lineHeight:'1.6',maxHeight:'130px',minHeight:'24px',
    paddingTop:'2px',resize:'none',fontFamily:SS,
  }});
  ta.addEventListener('input',()=>{
    ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,130)+'px';
    sendB.style.opacity=ta.value.trim()&&!state.loading?'1':'.35';
    sendB.style.transform=ta.value.trim()?'scale(1)':'scale(.9)';
  });
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});

  // Send btn — rounded rect with paper-plane icon (matching Figma)
  const sendB=b({style:{
    width:'40px',height:'40px',borderRadius:'12px',
    background:C.dark,color:'rgba(255,255,255,0.9)',fontSize:'16px',
    display:'flex',alignItems:'center',justifyContent:'center',
    flexShrink:'0',boxShadow:'0 4px 12px rgba(28,43,58,0.2)',
    opacity:'.35',transform:'scale(.9)',transition:'all .18s',
  }},'↑');
  sendB.addEventListener('click',doSend);
  inputWrap.append(ta,sendB);inputBar.appendChild(inputWrap);
  sc.appendChild(inputBar);

  async function doSend(){
    const text=ta.value.trim();if(!text||state.loading)return;
    ta.value='';ta.style.height='24px';sendB.style.opacity='.35';sendB.style.transform='scale(.9)';
    state.msgs.push({id:'u'+Date.now(),role:'user',content:text,ts:Date.now()});
    await save('av_msgs',state.msgs.slice(-60));state.loading=true;renderMsgs();
    try{
      const token=state.token||localStorage.getItem('aevi_token');
      const res=await fetch(`${BACKEND}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json',...(token?{'Authorization':'Bearer '+token}:{})},body:JSON.stringify({messages:state.msgs.map(m=>({role:m.role,content:m.content}))})});
      if(res.status===429){state.msgs.push({id:'l'+Date.now(),role:'assistant',ts:Date.now(),content:"You've reached your 5 message daily limit.\n\nUpgrade to Aevi Plus for unlimited conversations."});await save('av_msgs',state.msgs.slice(-60));state.loading=false;renderMsgs();setTimeout(()=>go('upgrade','sR'),2500);return;}
      if(!res.ok)throw new Error('HTTP '+res.status);
      const data=await res.json();
      if(data.memory_saved){const mr=await fetch(`${BACKEND}/api/memories`,{headers:{...(token?{'Authorization':'Bearer '+token}:{})}});if(mr.ok){const md=await mr.json();if(md.memories){state.mem=md.memories;await save('av_m',state.mem);}}}
      state.msgs.push({id:'a'+Date.now(),role:'assistant',content:data.content,ts:Date.now()});
      await save('av_msgs',state.msgs.slice(-60));
    }catch(e){state.msgs.push({id:'e'+Date.now(),role:'assistant',content:'Error: '+e.message,ts:Date.now()});}
    state.loading=false;renderMsgs();
  }
  return sc;
}

/* ══════════════════════════════
   7. INSIGHTS
══════════════════════════════ */
function insights(){
  const sc=d({class:'screen'});
  const hdr=d({style:{padding:'58px 24px 20px',borderBottom:`1px solid ${C.border}`,background:C.bg}});
  hdr.appendChild(h(2,{style:{fontFamily:SF,fontSize:'44px',fontWeight:'500',color:C.dark,fontStyle:'italic'}},'Insights'));
  hdr.appendChild(p({style:{fontSize:'14px',color:C.textM,marginTop:'4px',fontFamily:SS}},'Patterns from your reflections'));
  sc.appendChild(hdr);

  const body=d({style:{flex:'1',overflowY:'auto',padding:'24px 20px 110px',background:C.bg}});
  const sEl=document.createElement('style');
  sEl.textContent=`@keyframes fU{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}`;
  document.head.appendChild(sEl);

  // Insight cards — white with dark circle icon
  [{icon:'◇',title:'Recurring themes',desc:state.mem.length>=2?`You often return to "${state.mem.slice(-1)[0].key.replace(/_/g,' ')}".`:'Keep reflecting — patterns emerge after a few sessions.',done:state.mem.length>=2},
   {icon:'◎',title:'Reflection streak',desc:'Consistency builds real clarity.',done:true},
   {icon:'◎',title:'Memory growth',desc:state.mem.length>0?`Aevi holds ${state.mem.length} ${state.mem.length===1?'memory':'memories'} about you.`:'Start chatting to build memory.',done:state.mem.length>0},
  ].forEach((item,i)=>{
    const c2=d({style:{
      display:'flex',alignItems:'center',gap:'16px',
      padding:'18px 20px',borderRadius:'16px',marginBottom:'10px',
      border:`1px solid ${C.border}`,background:C.card,
      boxShadow:'0 1px 4px rgba(0,0,0,0.04)',
      animation:`fU .3s ease forwards`,animationDelay:`${i*0.08}s`,opacity:'0',
    }});
    const ico=d({style:{
      width:'40px',height:'40px',borderRadius:'50%',flexShrink:'0',
      background:item.done?C.dark:'rgba(28,43,58,0.07)',
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:'16px',color:item.done?'#FFFFFF':C.textM,
    }},item.done?'✓':item.icon);
    const txt=d({style:{flex:'1'}});
    txt.appendChild(p({style:{fontSize:'15px',fontWeight:'600',color:C.dark,marginBottom:'3px',fontFamily:SS}},item.title));
    txt.appendChild(p({style:{fontSize:'13px',color:C.textM,lineHeight:'1.5',fontFamily:SS}},item.desc));
    c2.append(ico,txt);body.appendChild(c2);
  });

  body.appendChild(sectionLbl('Memory bank'));

  if(state.mem.length===0){
    const empty=d({style:{background:C.card,borderRadius:'16px',padding:'28px',textAlign:'center',border:`1px solid ${C.border}`}});
    empty.appendChild(p({style:{fontSize:'14px',color:C.textM,fontFamily:SS,lineHeight:'1.7',marginBottom:'16px'}},'Nothing saved yet. Have a conversation — Aevi will quietly remember what matters.'));
    empty.appendChild(b({onClick:()=>go('chat','sR'),style:{padding:'10px 24px',borderRadius:'100px',border:`1px solid ${C.border}`,background:'transparent',color:C.dark,fontSize:'13px',fontFamily:SS,fontWeight:'500'}},'Start chatting →'));
    body.appendChild(empty);
  } else {
    state.mem.forEach(m=>{
      const mc=d({style:{background:C.card,borderRadius:'14px',padding:'16px 18px',marginBottom:'10px',border:`1px solid ${C.border}`,borderLeft:`3px solid ${C.dark}`,boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}});
      mc.appendChild(p({style:{fontSize:'10px',color:C.textH,fontFamily:SS,letterSpacing:'.09em',textTransform:'uppercase',marginBottom:'5px',fontWeight:'600'}},m.key.replace(/_/g,' ')));
      mc.appendChild(p({style:{fontSize:'14px',color:C.dark,fontFamily:SS,lineHeight:'1.6'}},m.value));
      body.appendChild(mc);
    });
  }
  sc.append(body,navBar('insights'));return sc;
}

  const sc=d({class:'screen'});

        borderRadius:'100px',fontFamily:SS,fontWeight:'600',letterSpacing:'.04em',whiteSpace:'nowrap',

    pr.appendChild(d({style:{fontSize:'12px',color:C.textM,fontFamily:SS}},plan.period));
    top.appendChild(pr);pc.appendChild(top);
    plan.features.forEach(f=>{
      const fr=d({style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}});
      fr.appendChild(d({style:{width:'6px',height:'6px',borderRadius:'50%',background:C.textM,flexShrink:'0'}}));

      pc.appendChild(fr);

    body.appendChild(pc);

  body.appendChild(d({style:{height:'8px'}}));
  body.appendChild(primBtn('Start Aevi Plus — €9/mo',()=>{}));

  body.appendChild(p({style:{textAlign:'center',fontSize:'12px',color:C.textH,fontFamily:SS}},'Cancel anytime · No commitment'));
  sc.appendChild(body);return sc;
}
