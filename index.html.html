<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Aevi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,300;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#EAECF0;}
body{display:flex;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;}
#app{width:100%;max-width:390px;min-height:100svh;background:#fff;display:flex;flex-direction:column;overflow:hidden;position:relative;}
input,textarea{outline:none;font-family:'Plus Jakarta Sans',sans-serif;}
button{cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:none;}
.screen{flex:1;display:flex;flex-direction:column;min-height:100svh;}
@keyframes sR{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:translateX(0)}}
@keyframes sL{from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:translateX(0)}}
@keyframes fI{from{opacity:0}to{opacity:1}}
@keyframes fU{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes dotP{0%,100%{opacity:.25;transform:scale(.65)}50%{opacity:1;transform:scale(1)}}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body><div id="app"></div>
<script>
/* ── PALETTE ── */
const C={
  white:'#FFFFFF',
  bg:'#F9FAFB',
  border:'#E5E7EB',
  borderLight:'#F3F4F6',
  text:'#0D1117',
  textS:'#374151',
  textM:'#6B7280',
  textH:'#9CA3AF',
  in:'#6366F1',
  inD:'#4338CA',
  inBg:'#EEF2FF',
  inBd:'#C7D2FE',
  green:'#10B981',
};
const SF="'Cormorant Garamond',Georgia,serif";
const SS="'Plus Jakarta Sans',sans-serif";
const BACKEND='https://aevi-backend.vercel.app';
const ORDER=['welcome','signup','onboarding','persona','home','chat','insights','upgrade'];

const state={
  screen:'welcome',
  user:{name:'',goal:'',tone:'',topics:[]},
  msgs:[],mem:[],loading:false,
  token:localStorage.getItem('aevi_token')||null,
};

async function load(k){try{const r=await window.storage?.get(k);return r?JSON.parse(r.value):null}catch{return null}}
async function save(k,v){try{await window.storage?.set(k,JSON.stringify(v))}catch{}}

async function init(){
  const[u,m,msgs]=await Promise.all([load('av_u'),load('av_m'),load('av_msgs')]);
  if(u){state.user=u;state.screen='home';}
  if(m)state.mem=m;
  if(msgs)state.msgs=msgs;
  render('fI');
}

function go(s,dir){
  if(!dir){
    const pi=ORDER.indexOf(state.screen),ci=ORDER.indexOf(s);
    dir=s==='welcome'?'sL':ci>pi?'sR':ci<pi?'sL':'fI';
  }
  state.screen=s;render(dir);window.scrollTo(0,0);
}

function render(dir='sR'){
  const app=document.getElementById('app');
  const screens={welcome,signup,onboarding,persona,home,chat,insights,upgrade};
  const el=screens[state.screen]?.();
  if(!el)return;
  el.style.animation=`${dir} .26s cubic-bezier(.4,0,.2,1) forwards`;
  app.innerHTML='';app.appendChild(el);
}

/* ── ELEMENT HELPERS ── */
function el(tag,attrs,...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='class')e.className=v;
    else e.setAttribute(k,v);
  }
  kids.forEach(c=>{if(c==null)return;e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}
const D=(a,...c)=>el('div',a,...c);
const B=(a,...c)=>el('button',a,...c);
const P=(a,...c)=>el('p',a,...c);
const H=(n,a,...c)=>el('h'+n,a,...c);
const S=(a,...c)=>el('span',a,...c);
const I=(a)=>el('input',a);

/* ── COMPONENTS ── */
function backBtn(to,dir='sL'){
  return B({onClick:()=>go(to,dir),style:{
    width:'38px',height:'38px',borderRadius:'50%',
    background:C.bg,border:`1px solid ${C.border}`,
    display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:'16px',color:C.text,marginBottom:'28px',flexShrink:'0',
    transition:'background .15s',
  }},'←');
}

function primaryBtn(label,onClick){
  const b=B({onClick,style:{
    width:'100%',height:'56px',borderRadius:'16px',
    background:C.text,color:C.white,
    fontSize:'15px',fontWeight:'600',fontFamily:SS,
    display:'flex',alignItems:'center',justifyContent:'center',gap:'12px',
    boxShadow:`0 8px 24px rgba(13,17,23,0.22)`,
    transition:'transform .14s,box-shadow .14s',letterSpacing:'.01em',
  }});
  b.appendChild(S({},label));
  b.appendChild(D({style:{
    width:'28px',height:'28px',borderRadius:'8px',
    background:'rgba(255,255,255,0.12)',
    display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:'14px',color:C.white,
  }},'→'));
  b.addEventListener('mouseover',()=>{b.style.transform='translateY(-1px)';b.style.boxShadow='0 12px 32px rgba(13,17,23,0.3)';});
  b.addEventListener('mouseout',()=>{b.style.transform='';b.style.boxShadow=`0 8px 24px rgba(13,17,23,0.22)`;});
  return b;
}

function ghostBtn(label,onClick){
  return B({onClick,style:{
    width:'100%',height:'48px',borderRadius:'16px',
    background:C.white,color:C.textS,
    fontSize:'14px',fontWeight:'500',fontFamily:SS,
    border:`1.5px solid ${C.border}`,
    transition:'border-color .15s,background .15s',
  }},label);
}

function indigoChip(label){
  return D({style:{
    display:'inline-flex',alignItems:'center',gap:'6px',
    padding:'5px 12px',borderRadius:'100px',
    background:C.inBg,border:`1px solid ${C.inBd}`,
  }},S({style:{fontSize:'10px',color:C.in,fontWeight:'600',letterSpacing:'.04em'}},label));
}

function navBar(active){
  const nav=D({style:{
    position:'fixed',bottom:'0',left:'50%',transform:'translateX(-50%)',
    width:'100%',maxWidth:'390px',
    background:'rgba(255,255,255,0.94)',
    backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
    borderTop:`1px solid ${C.borderLight}`,
    display:'flex',padding:'8px 8px 24px',zIndex:'20',gap:'2px',
  }});
  [['⌂','Home','home'],['✦','Chat','chat'],['◎','Insights','insights'],['↑','Upgrade','upgrade']].forEach(([icon,lbl,s])=>{
    const isA=active===s;
    const b=B({onClick:()=>go(s,'fI'),style:{
      flex:'1',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',
      background:isA?C.inBg:'transparent',
      borderRadius:'12px',padding:'8px 4px',
      transition:'all .18s',
    }},
    S({style:{fontSize:'18px',color:isA?C.in:C.textH,transition:'color .18s'}},(icon)),
    S({style:{fontSize:'10px',color:isA?C.in:C.textH,fontWeight:isA?'600':'400',letterSpacing:'.02em'}},(lbl))
    );
    nav.appendChild(b);
  });
  return nav;
}

function progBar(step,total=3){
  const w=D({style:{display:'flex',gap:'6px',alignItems:'center'}});
  for(let i=0;i<total;i++){
    w.appendChild(D({style:{
      height:'3px',borderRadius:'2px',transition:'all .3s',
      width:i===step?'28px':'8px',
      background:i===step?C.in:C.border,
    }}));
  }
  return w;
}

/* ── WELCOME ── */
function welcome(){
  const s=D({class:'screen',style:{justifyContent:'space-between',overflow:'hidden',position:'relative'}});

  // subtle grid bg decoration
  const grid=D({style:{
    position:'absolute',top:'0',left:'0',right:'0',height:'55%',
    backgroundImage:`linear-gradient(${C.borderLight} 1px,transparent 1px),linear-gradient(90deg,${C.borderLight} 1px,transparent 1px)`,
    backgroundSize:'32px 32px',
    maskImage:'linear-gradient(180deg,rgba(0,0,0,.06) 0%,transparent 80%)',
    WebkitMaskImage:'linear-gradient(180deg,rgba(0,0,0,.06) 0%,transparent 80%)',
    pointerEvents:'none',zIndex:'0',
  }});
  s.appendChild(grid);

  const hero=D({style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'100px 32px 40px',textAlign:'center',position:'relative',zIndex:'1'}});

  // Orb
  const orbW=D({style:{position:'relative',width:'96px',height:'96px',margin:'0 auto 36px'}});
  orbW.appendChild(D({style:{position:'absolute',inset:'-14px',borderRadius:'50%',border:'1px solid rgba(99,102,241,0.12)',animation:'pulse 3s ease-in-out infinite'}}));
  orbW.appendChild(D({style:{position:'absolute',inset:'-26px',borderRadius:'50%',border:'1px dashed rgba(99,102,241,0.06)',animation:'spin 22s linear infinite'}}));
  const orb=D({style:{
    width:'100%',height:'100%',borderRadius:'50%',
    background:C.text,
    display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:'34px',color:C.white,
    boxShadow:`0 16px 48px rgba(13,17,23,0.28),0 0 0 1px rgba(255,255,255,0.08) inset`,
    animation:'float 6s ease-in-out infinite',
    position:'relative',
  }},'✦');
  // indigo accent dot
  const dot=D({style:{position:'absolute',bottom:'6px',right:'6px',width:'14px',height:'14px',borderRadius:'50%',background:C.in,border:`2px solid ${C.white}`,boxShadow:`0 2px 8px rgba(99,102,241,0.5)`}});
  orb.appendChild(dot);
  orbW.appendChild(orb);
  hero.appendChild(orbW);

  hero.appendChild(H(1,{style:{fontFamily:SF,fontSize:'64px',fontWeight:'400',fontStyle:'italic',color:C.text,letterSpacing:'-.03em',lineHeight:'.95',marginBottom:'14px'}},'Aevi'));
  hero.appendChild(P({style:{fontFamily:SF,fontSize:'18px',fontStyle:'italic',color:C.textM,lineHeight:'1.6',maxWidth:'220px',margin:'0 auto'}},'Your private second mind'));

  // feature pills
  const pills=D({style:{display:'flex',gap:'8px',justifyContent:'center',flexWrap:'wrap',marginTop:'28px'}});
  ['Remembers you','Thinks with you','Stays private'].forEach(t=>{
    pills.appendChild(D({style:{padding:'6px 14px',borderRadius:'100px',background:C.bg,border:`1px solid ${C.border}`,fontSize:'11px',color:C.textM,fontWeight:'500',fontFamily:SS,letterSpacing:'.01em'}},t));
  });
  hero.appendChild(pills);
  s.appendChild(hero);

  const bottom=D({style:{padding:'0 28px 52px',position:'relative',zIndex:'1',display:'flex',flexDirection:'column',gap:'12px'}});
  bottom.appendChild(primaryBtn('Begin your journey',()=>go('signup','sR')));
  bottom.appendChild(ghostBtn('Sign in to your account',()=>go('home','sR')));
  s.appendChild(bottom);
  return s;
}

/* ── SIGNUP ── */
function signup(){
  const s=D({class:'screen',style:{overflowY:'auto'}});
  const wrap=D({style:{padding:'60px 28px 48px',display:'flex',flexDirection:'column',flex:'1'}});
  wrap.appendChild(backBtn('welcome'));

  wrap.appendChild(indigoChip('CREATE ACCOUNT'));
  wrap.appendChild(D({style:{height:'12px'}}));
  wrap.appendChild(H(2,{style:{fontFamily:SF,fontSize:'40px',fontStyle:'italic',color:C.text,lineHeight:'1.1',marginBottom:'8px',fontWeight:'400'}},'Your private\nspace awaits'));
  wrap.appendChild(P({style:{fontSize:'14px',color:C.textM,lineHeight:'1.65',marginBottom:'36px',fontFamily:SS}},'Everything you share stays between you and Aevi.'));

  let nV='',eV='',pV='';
  [['Full name','text','What should I call you?',v=>nV=v],
   ['Email address','email','you@example.com',v=>eV=v],
   ['Password','password','Create a password',v=>pV=v]].forEach(([lbl,type,ph,cb])=>{
    const fw=D({style:{marginBottom:'20px'}});
    fw.appendChild(P({style:{fontSize:'12px',color:C.textM,fontWeight:'600',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:'8px',fontFamily:SS}},lbl));
    const i=I({type,placeholder:ph,style:{
      width:'100%',padding:'15px 18px',
      borderRadius:'14px',border:`1.5px solid ${C.border}`,
      background:C.bg,color:C.text,fontSize:'15px',fontFamily:SS,
      transition:'border-color .2s,box-shadow .2s,background .2s',
    }});
    i.addEventListener('focus',()=>{i.style.borderColor=C.in;i.style.boxShadow=`0 0 0 3px rgba(99,102,241,0.1)`;i.style.background=C.white;});
    i.addEventListener('blur',()=>{i.style.borderColor=C.border;i.style.boxShadow='none';i.style.background=C.bg;});
    i.addEventListener('input',e=>cb(e.target.value));
    fw.appendChild(i);wrap.appendChild(fw);
  });

  wrap.appendChild(D({style:{flex:'1',minHeight:'16px'}}));
  wrap.appendChild(primaryBtn('Create account',()=>{if(nV.trim()){state.user.name=nV.trim();go('onboarding','sR');}}));
  wrap.appendChild(D({style:{height:'12px'}}));
  const note=P({style:{textAlign:'center',fontSize:'12px',color:C.textH,fontFamily:SS,lineHeight:'1.5'}});
  note.innerHTML='By continuing you agree to our <span style="color:'+C.in+';text-decoration:underline;cursor:pointer">Privacy Policy</span>';
  wrap.appendChild(note);
  s.appendChild(wrap);
  return s;
}

/* ── ONBOARDING ── */
function onboarding(){
  const s=D({class:'screen',style:{overflowY:'auto'}});
  const wrap=D({style:{padding:'60px 28px 48px',display:'flex',flexDirection:'column',flex:'1'}});
  wrap.appendChild(backBtn('signup'));
  wrap.appendChild(indigoChip('STEP 1 OF 2'));
  wrap.appendChild(D({style:{height:'12px'}}));
  wrap.appendChild(H(2,{style:{fontFamily:SF,fontSize:'38px',fontStyle:'italic',color:C.text,lineHeight:'1.1',marginBottom:'8px',fontWeight:'400'}},'What brings\nyou here?'));
  wrap.appendChild(P({style:{fontSize:'14px',color:C.textM,lineHeight:'1.65',marginBottom:'32px',fontFamily:SS}},"I'll personalise every conversation around your main goal."));

  let sel='';
  const goals=[
    {id:'reflect',icon:'◎',label:'Self-reflection',sub:'Process thoughts, understand yourself deeply'},
    {id:'decide',icon:'⊙',label:'Better decisions',sub:'Think through choices with clarity and focus'},
    {id:'create',icon:'✦',label:'Creative writing',sub:'Turn raw ideas into polished, compelling content'},
    {id:'journal',icon:'◇',label:'Daily journaling',sub:'Build a meaningful, consistent reflection habit'},
  ];

  const cards=goals.map(g=>{
    const card=B({style:{
      width:'100%',padding:'18px 20px',borderRadius:'18px',
      border:`1.5px solid ${C.border}`,background:C.white,
      textAlign:'left',marginBottom:'10px',
      display:'flex',alignItems:'center',gap:'16px',
      boxShadow:'none',transition:'all .16s',
    }});
    const iconBox=D({style:{width:'46px',height:'46px',borderRadius:'14px',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',color:C.textM,flexShrink:'0',transition:'all .16s'}},g.icon);
    const txt=D({style:{flex:'1',textAlign:'left'}});
    txt.appendChild(D({style:{fontSize:'15px',fontWeight:'600',color:C.text,marginBottom:'4px',fontFamily:SS}},g.label));
    txt.appendChild(D({style:{fontSize:'12px',color:C.textM,lineHeight:'1.5',fontFamily:SS}},g.sub));
    const chk=D({style:{width:'22px',height:'22px',borderRadius:'50%',border:`2px solid ${C.border}`,flexShrink:'0',transition:'all .16s',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',color:'transparent'}});
    card.append(iconBox,txt,chk);
    card.addEventListener('click',()=>{
      sel=g.id;
      cards.forEach(c=>{
        c.style.border=`1.5px solid ${C.border}`;c.style.background=C.white;c.style.boxShadow='none';
        c.firstChild.style.background=C.bg;c.firstChild.style.color=C.textM;
        c.lastChild.style.background='transparent';c.lastChild.style.border=`2px solid ${C.border}`;c.lastChild.style.color='transparent';
      });
      card.style.border=`1.5px solid ${C.in}`;card.style.background=C.inBg;card.style.boxShadow=`0 0 0 3px rgba(99,102,241,0.08)`;
      iconBox.style.background=C.in;iconBox.style.color=C.white;
      chk.style.background=C.in;chk.style.border=`2px solid ${C.in}`;chk.style.color=C.white;chk.textContent='✓';
    });
    return card;
  });
  cards.forEach(c=>wrap.appendChild(c));
  wrap.appendChild(D({style:{flex:'1',minHeight:'16px'}}));

  const bot=D({style:{display:'flex',alignItems:'center',justifyContent:'space-between'}});
  bot.appendChild(progBar(0));
  const nb=B({onClick:()=>{if(sel){state.user.goal=sel;go('persona','sR');}},style:{
    height:'52px',padding:'0 28px',borderRadius:'14px',
    background:C.text,color:C.white,
    fontSize:'15px',fontWeight:'600',fontFamily:SS,
    display:'flex',alignItems:'center',gap:'10px',
    boxShadow:`0 6px 20px rgba(13,17,23,0.2)`,
    transition:'transform .14s',
  }},'Next ',S({style:{fontSize:'16px'}},'→'));
  bot.appendChild(nb);
  wrap.appendChild(bot);
  s.appendChild(wrap);
  return s;
}

/* ── PERSONA ── */
function persona(){
  const s=D({class:'screen',style:{overflowY:'auto'}});
  const wrap=D({style:{padding:'60px 28px 48px',display:'flex',flexDirection:'column',flex:'1'}});
  wrap.appendChild(backBtn('onboarding'));
  wrap.appendChild(indigoChip('STEP 2 OF 2'));
  wrap.appendChild(D({style:{height:'12px'}}));
  wrap.appendChild(H(2,{style:{fontFamily:SF,fontSize:'38px',fontStyle:'italic',color:C.text,lineHeight:'1.1',marginBottom:'8px',fontWeight:'400'}},'Shape\nmy voice'));
  wrap.appendChild(P({style:{fontSize:'14px',color:C.textM,lineHeight:'1.65',marginBottom:'28px',fontFamily:SS}},'How should I sound when I talk to you?'));

  let tone='';const selT=[];
  const tones=[{id:'warm',l:'Warm & Gentle'},{id:'direct',l:'Direct & Honest'},{id:'curious',l:'Curious & Deep'},{id:'calm',l:'Calm & Grounding'}];
  const grid=D({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'28px'}});
  const tBtns=tones.map(t=>{
    const b=B({style:{
      padding:'16px 12px',borderRadius:'16px',border:`1.5px solid ${C.border}`,
      background:C.white,color:C.textM,fontSize:'13px',fontFamily:SS,fontWeight:'500',
      transition:'all .15s',textAlign:'center',
    }},t.l);
    b.addEventListener('click',()=>{
      tone=t.id;
      tBtns.forEach(x=>{x.style.border=`1.5px solid ${C.border}`;x.style.background=C.white;x.style.color=C.textM;});
      b.style.border=`1.5px solid ${C.in}`;b.style.background=C.inBg;b.style.color=C.inDark;
    });
    return b;
  });
  tBtns.forEach(b=>grid.appendChild(b));
  wrap.appendChild(grid);

  wrap.appendChild(P({style:{fontSize:'13px',fontWeight:'600',color:C.text,marginBottom:'14px',fontFamily:SS}},'Topics you want to explore'));
  const tagW=D({style:{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'32px'}});
  ['Work & career','Relationships','Creativity','Health','Purpose','Decisions','Emotions','Ideas','Growth','Writing'].forEach(t=>{
    const tag=B({style:{
      padding:'9px 16px',borderRadius:'100px',border:`1.5px solid ${C.border}`,
      background:C.white,color:C.textM,fontSize:'12px',fontFamily:SS,fontWeight:'500',
      transition:'all .15s',
    }},t);
    tag.addEventListener('click',()=>{
      if(selT.includes(t)){selT.splice(selT.indexOf(t),1);tag.style.border=`1.5px solid ${C.border}`;tag.style.background=C.white;tag.style.color=C.textM;}
      else{selT.push(t);tag.style.border=`1.5px solid ${C.in}`;tag.style.background=C.inBg;tag.style.color=C.inDark;}
    });
    tagW.appendChild(tag);
  });
  wrap.appendChild(tagW);
  wrap.appendChild(D({style:{flex:'1',minHeight:'12px'}}));

  const bot=D({style:{display:'flex',alignItems:'center',justifyContent:'space-between'}});
  bot.appendChild(progBar(1));
  const nb=B({onClick:async()=>{
    if(!tone)return;
    state.user.tone=tone;state.user.topics=[...selT];
    await save('av_u',state.user);go('home','sR');
  },style:{
    height:'52px',padding:'0 28px',borderRadius:'14px',
    background:C.text,color:C.white,fontSize:'15px',fontWeight:'600',fontFamily:SS,
    display:'flex',alignItems:'center',gap:'10px',
    boxShadow:`0 6px 20px rgba(13,17,23,0.2)`,
  }},'Meet Aevi ',S({style:{fontSize:'16px'}},'→'));
  bot.appendChild(nb);
  wrap.appendChild(bot);
  s.appendChild(wrap);
  return s;
}

/* ── HOME ── */
function home(){
  const s=D({class:'screen'});
  const hour=new Date().getHours();
  const greet=hour<5?'Good night':hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';

  // Header
  const hdr=D({style:{padding:'58px 24px 20px',borderBottom:`1px solid ${C.borderLight}`,background:C.white}});
  const hrow=D({style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}});

  const hLeft=D({});
  hLeft.appendChild(P({style:{fontSize:'12px',color:C.textH,letterSpacing:'.03em',marginBottom:'4px',fontFamily:SS}},greet));
  hLeft.appendChild(H(2,{style:{fontFamily:SF,fontSize:'32px',fontStyle:'italic',color:C.text,letterSpacing:'-.01em',fontWeight:'400',lineHeight:'1.1'}},(state.user.name||'Friend')));

  const hRight=D({style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'8px'}});
  hRight.appendChild(B({onClick:()=>go('upgrade','sR'),style:{
    padding:'7px 14px',borderRadius:'100px',border:`1.5px solid ${C.inBd}`,
    background:C.inBg,color:C.in,fontSize:'11px',fontFamily:SS,fontWeight:'600',
  }},'✦  Free plan'));
  hRight.appendChild(B({onClick:async()=>{
    await save('av_u',null);await save('av_m',null);await save('av_msgs',null);
    state.user={name:'',goal:'',tone:'',topics:[]};state.mem=[];state.msgs=[];
    go('welcome','sL');
  },style:{background:'none',border:'none',fontSize:'11px',color:C.textH,fontFamily:SS,padding:'2px 0',textDecoration:'underline'}},'Sign out'));
  hrow.append(hLeft,hRight);hdr.appendChild(hrow);
  s.appendChild(hdr);

  const body=D({style:{flex:'1',overflowY:'auto',padding:'24px 20px 110px'}});

  // Memory card — dark

      empty.appendChild(P({style:{fontSize:'14px',color:C.textM,lineHeight:'1.7',marginBottom:'32px',maxWidth:'240px',fontFamily:SS}},'A thought, a feeling, a decision — bring it here.'));

          background:C.bg,border:`1.5px solid ${C.border}`,
          color:C.textS,borderRadius:'14px',padding:'13px 16px',
          fontSize:'13px',fontFamily:SS,textAlign:'left',
          transition:'all .15s',fontWeight:'500',
        }},pr));

        }});

            width:'30px',height:'30px',borderRadius:'50%',background:C.text,
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:'11px',color:C.white,flexShrink:'0',
            boxShadow:`0 2px 8px rgba(13,17,23,0.2)`,
          }},'✦'));

        const inner=D({style:{maxWidth:'78%'}});
        const senderLbl=D({style:{
          fontSize:'10px',color:C.textH,marginBottom:'5px',
          fontFamily:SS,textAlign:msg.role==='user'?'right':'left',
          display:'flex',alignItems:'center',gap:'6px',
          flexDirection:msg.role==='user'?'row-reverse':'row',
        }});
        senderLbl.appendChild(S({},msg.role==='user'?'You':'Aevi'));
        senderLbl.appendChild(S({style:{opacity:'.7'}},new Date(msg.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})));
        inner.appendChild(senderLbl);
        const bubble=D({style:{
          background:msg.role==='user'?C.text:C.bg,

          fontSize:'14px',lineHeight:'1.75',whiteSpace:'pre-wrap',fontFamily:SS,

        }},msg.content);
        inner.appendChild(bubble);
        wrap.appendChild(inner);
        msgsArea.appendChild(wrap);
      });
      if(state.loading){
        const wrap=D({style:{display:'flex',gap:'10px',alignItems:'flex-end',marginBottom:'16px'}});
        wrap.appendChild(D({style:{width:'30px',height:'30px',borderRadius:'50%',background:C.text,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',color:C.white,flexShrink:'0'}},'✦'));
        const dots=D({style:{background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:'20px 20px 20px 4px',padding:'14px 18px',display:'flex',gap:'6px'}});

  const styleEl=document.createElement('style');
  styleEl.textContent=`@keyframes fU{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}`;

  renderMsgs();s.appendChild(msgsArea);

  // Input bar
  const inputBar=D({style:{
    padding:'12px 16px 32px',
    background:'rgba(255,255,255,0.95)',
    backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',

    display:'flex',gap:'10px',alignItems:'flex-end',
    background:C.bg,border:`1.5px solid ${C.border}`,
    borderRadius:'20px',padding:'10px 10px 10px 18px',
    transition:'border-color .2s,box-shadow .2s',
  }});
  inputWrap.addEventListener('focusin',()=>{inputWrap.style.borderColor=C.in;inputWrap.style.boxShadow=`0 0 0 3px rgba(99,102,241,0.1)`;inputWrap.style.background=C.white;});
  inputWrap.addEventListener('focusout',()=>{inputWrap.style.borderColor=C.border;inputWrap.style.boxShadow='none';inputWrap.style.background=C.bg;});

  const ta=el('textarea',{placeholder:'A thought, a question, anything...',rows:'1',style:{
    flex:'1',border:'none',background:'transparent',color:C.text,
    fontSize:'14px',lineHeight:'1.6',maxHeight:'130px',minHeight:'24px',
    paddingTop:'2px',resize:'none',fontFamily:SS,
  }});
  ta.addEventListener('input',()=>{
    ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,130)+'px';
    sendB.style.opacity=ta.value.trim()&&!state.loading?'1':'.35';
    sendB.style.transform=ta.value.trim()?'scale(1)':'scale(.9)';
  });
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});

  const sendB=B({style:{
    width:'42px',height:'42px',borderRadius:'14px',
    background:C.text,color:C.white,fontSize:'16px',
    display:'flex',alignItems:'center',justifyContent:'center',
    flexShrink:'0',boxShadow:`0 4px 12px rgba(13,17,23,0.22)`,
    opacity:'.35',transform:'scale(.9)',transition:'all .18s',
  }},'↑');
  sendB.addEventListener('click',doSend);
  inputWrap.append(ta,sendB);
  inputBar.appendChild(inputWrap);
  inputBar.appendChild(P({style:{textAlign:'center',fontSize:'10px',color:C.textH,marginTop:'10px',letterSpacing:'.04em',fontFamily:SS}},'✦  Private · Remembered · Yours'));
  s.appendChild(inputBar);

  async function doSend(){
    const text=ta.value.trim();if(!text||state.loading)return;
    ta.value='';ta.style.height='24px';sendB.style.opacity='.35';sendB.style.transform='scale(.9)';
    state.msgs.push({id:'u'+Date.now(),role:'user',content:text,ts:Date.now()});
    await save('av_msgs',state.msgs.slice(-60));
    state.loading=true;renderMsgs();
    try{
      const token=state.token||localStorage.getItem('aevi_token');
      const res=await fetch(`${BACKEND}/api/chat`,{
        method:'POST',
        headers:{'Content-Type':'application/json',...(token?{'Authorization':'Bearer '+token}:{})},
        body:JSON.stringify({messages:state.msgs.map(m=>({role:m.role,content:m.content}))})
      });
      if(res.status===429){
        state.msgs.push({id:'l'+Date.now(),role:'assistant',ts:Date.now(),content:"You've reached your 5 message daily limit on the free plan.\n\nUpgrade to Aevi Plus for unlimited conversations. ✦"});
        await save('av_msgs',state.msgs.slice(-60));state.loading=false;renderMsgs();
        setTimeout(()=>go('upgrade','sR'),2500);return;
      }
      if(!res.ok)throw new Error('HTTP '+res.status);
      const data=await res.json();
      if(data.memory_saved){
        const mr=await fetch(`${BACKEND}/api/memories`,{headers:{...(token?{'Authorization':'Bearer '+token}:{})}});
        if(mr.ok){const md=await mr.json();if(md.memories){state.mem=md.memories;await save('av_m',state.mem);}}
      }
      state.msgs.push({id:'a'+Date.now(),role:'assistant',content:data.content,ts:Date.now()});
      await save('av_msgs',state.msgs.slice(-60));
    }catch(e){
      state.msgs.push({id:'e'+Date.now(),role:'assistant',content:'Error: '+e.message,ts:Date.now()});
    }
    state.loading=false;renderMsgs();
  }
  return s;
}
