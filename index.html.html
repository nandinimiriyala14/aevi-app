async function load(k){try{const r=await window.storage?.get(k);return r?JSON.parse(r.value):null}catch{return null}}
async function save(k,v){try{await window.storage?.set(k,JSON.stringify(v))}catch{}}

async function init(){
  // Check existing Supabase session
  const{data:{session}}=await supa.auth.getSession();
  if(session){
    state.session=session;
    localStorage.setItem('aevi_token',session.access_token);
    const[u,m,msgs]=await Promise.all([load('av_u'),load('av_m'),load('av_msgs')]);
    if(u){state.user=u;state.screen='home';}
    else{state.screen='onboarding';}
    if(m)state.mem=m;if(msgs)state.msgs=msgs;
  }
  // Listen for auth changes
  supa.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){
      state.session=session;
      localStorage.setItem('aevi_token',session.access_token);
    }
    if(event==='SIGNED_OUT'){
      state.session=null;
      localStorage.removeItem('aevi_token');
    }
  });
  render('fI');
}

function go(s,dir){
  if(!dir){const pi=ORDER.indexOf(state.screen),ci=ORDER.indexOf(s);dir=s==='welcome'?'sL':ci>pi?'sR':ci<pi?'sL':'fI';}
  state.screen=s;render(dir);window.scrollTo(0,0);
}

function render(dir='sR'){
  const app=document.getElementById('app');
  const screens={welcome,login,signup,onboarding,persona,home,chat,insights,upgrade};
  const e=screens[state.screen]?.();
  if(!e)return;
  e.style.animation=`${dir} .24s cubic-bezier(.4,0,.2,1) forwards`;
  app.innerHTML='';app.appendChild(e);
}

/* ── HELPERS ── */
function el(tag,a,...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(a||{})){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='class')e.className=v;
    else e.setAttribute(k,v);
  }
  kids.forEach(c=>{if(c==null)return;e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}
const d=(a,...c)=>el('div',a,...c);
const b=(a,...c)=>el('button',a,...c);
const p=(a,...c)=>el('p',a,...c);
const h=(n,a,...c)=>el('h'+n,a,...c);
const s=(a,...c)=>el('span',a,...c);
const inp=(a)=>el('input',a);

/* ── SHARED COMPONENTS ── */
function backBtn(to){
  return b({onClick:()=>go(to,'sL'),style:{
    width:'40px',height:'40px',borderRadius:'50%',
    background:C.card,border:`1px solid ${C.border}`,
    display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:'16px',color:C.dark,marginBottom:'32px',
    boxShadow:'0 1px 3px rgba(0,0,0,0.06)',
  }},'←');
}

function primBtn(label,onClick,opts={}){
  const btn=b({onClick,style:{
    width:'100%',height:'56px',borderRadius:'16px',
    background:C.dark,color:'#FFF',
    fontSize:'15px',fontWeight:'600',fontFamily:SS,
    display:'flex',alignItems:'center',justifyContent:'center',gap:'12px',
    boxShadow:'0 4px 20px rgba(28,43,58,0.22)',
    transition:'transform .13s,box-shadow .13s,opacity .2s',
    letterSpacing:'.01em',opacity:'1',
    ...opts,
  }});
  const lbl=s({style:{flex:'1',textAlign:'center'}},label);
  btn.appendChild(lbl);
  btn.appendChild(d({style:{width:'32px',height:'32px',borderRadius:'10px',background:'rgba(255,255,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'15px',color:'rgba(255,255,255,0.8)',marginRight:'4px'}},'→'));
  btn.addEventListener('mouseover',()=>{if(!btn.disabled){btn.style.transform='translateY(-1px)';btn.style.boxShadow='0 8px 28px rgba(28,43,58,0.28)';}});
  btn.addEventListener('mouseout',()=>{btn.style.transform='';btn.style.boxShadow='0 4px 20px rgba(28,43,58,0.22)';});
  btn.setLoading=(on)=>{
    btn.disabled=on;btn.style.opacity=on?'.7':'1';
    lbl.textContent=on?'Please wait…':label;
    btn.lastChild.textContent=on?'':'→';
  };
  return btn;
}

function ghostBtn(label,onClick){
  return b({onClick,style:{
    width:'100%',height:'52px',borderRadius:'16px',
    background:C.card,color:C.dark,fontSize:'14px',fontWeight:'500',fontFamily:SS,
    border:`1.5px solid ${C.border}`,boxShadow:'0 1px 3px rgba(0,0,0,0.04)',
    transition:'all .14s',
  }},label);
}

function inputField(lbl,type,ph,cb,opts={}){
  const fw=d({style:{marginBottom:'18px'}});
  if(lbl)fw.appendChild(p({style:{fontSize:'11px',color:C.textM,fontWeight:'600',letterSpacing:'.09em',textTransform:'uppercase',marginBottom:'8px',fontFamily:SS}},lbl));
  const i=inp({type,placeholder:ph,...opts,style:{
    width:'100%',padding:'16px 18px',borderRadius:'14px',
    border:`1px solid ${C.border}`,background:C.card,
    color:C.dark,fontSize:'15px',fontFamily:SS,
    boxShadow:'0 1px 4px rgba(0,0,0,0.04)',
    transition:'border-color .18s,box-shadow .18s',
    ...opts.style,
  }});
  i.addEventListener('focus',()=>{i.style.borderColor=C.dark;i.style.boxShadow=`0 0 0 3px rgba(28,43,58,0.08)`;});
  i.addEventListener('blur',()=>{i.style.borderColor=C.border;i.style.boxShadow='0 1px 4px rgba(0,0,0,0.04)';});
  i.addEventListener('input',e=>cb(e.target.value));
  fw.appendChild(i);
  const errEl=p({style:{fontSize:'12px',color:C.err,marginTop:'6px',fontFamily:SS,display:'none'}});
  fw.appendChild(errEl);
  fw._err=(msg)=>{errEl.textContent=msg;errEl.style.display=msg?'block':'none';i.style.borderColor=msg?C.err:C.border;};
  return fw;
}

function errorBanner(msg){
  return d({style:{
    background:'rgba(229,62,62,0.08)',border:'1px solid rgba(229,62,62,0.2)',
    borderRadius:'12px',padding:'12px 16px',marginBottom:'18px',
    display:'flex',alignItems:'center',gap:'10px',
  }},
  d({style:{fontSize:'16px',flexShrink:'0'}},'⚠'),
  p({style:{fontSize:'13px',color:C.err,fontFamily:SS,lineHeight:'1.5'}},msg)
  );
}

function navBar(active){
  const nav=d({style:{
    position:'fixed',bottom:'0',left:'50%',transform:'translateX(-50%)',
    width:'100%',maxWidth:'390px',
    background:'rgba(238,234,227,0.95)',
    backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',

  }});

      borderRadius:'12px',padding:'8px 4px',transition:'all .18s',

    s({style:{fontSize:'18px',color:isA?C.dark:C.textH}},(icons[sc])),
    s({style:{fontSize:'10px',color:isA?C.dark:C.textH,fontWeight:isA?'600':'400',fontFamily:SS}},lbl)
    ));
  });
  return nav;
}

function progDots(cur,total=3){
  const w=d({style:{display:'flex',gap:'6px',alignItems:'center'}});
  for(let i=0;i<total;i++)w.appendChild(d({style:{height:'4px',borderRadius:'2px',transition:'all .3s',width:i===cur?'28px':'8px',background:i===cur?C.dark:'rgba(28,43,58,0.2)'}}));
  return w;
}

function sectionLbl(text){
  return p({style:{fontSize:'11px',fontWeight:'600',color:C.textH,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'12px',fontFamily:SS}},text);

/* ══════════════════════════════
   LOGIN
══════════════════════════════ */
function login(){
  const sc=d({class:'screen',style:{overflowY:'auto'}});
  const wrap=d({style:{padding:'60px 24px 48px',display:'flex',flexDirection:'column',flex:'1'}});
  wrap.appendChild(backBtn('welcome'));
  wrap.appendChild(h(2,{style:{fontFamily:SF,fontSize:'52px',fontWeight:'500',color:C.dark,lineHeight:'1.0',marginBottom:'10px'}},'Welcome\nback.'));
  wrap.appendChild(p({style:{fontSize:'15px',color:C.textM,lineHeight:'1.6',marginBottom:'36px',fontFamily:SS}},'Sign in to continue your journey.'));

  let eV='',pV='';
  const errBox=d({style:{marginBottom:'4px'}});
  wrap.appendChild(errBox);

  const emailF=inputField('EMAIL','email','you@example.com',v=>eV=v);
  const passF=inputField('PASSWORD','password','Your password',v=>pV=v);
  wrap.append(emailF,passF);

  // Forgot password
  const forgot=b({onClick:async()=>{
    if(!eV.trim()){emailF._err('Enter your email first');return;}
    forgot.disabled=true;forgot.textContent='Sending…';
    const{error}=await supa.auth.resetPasswordForEmail(eV.trim(),{redirectTo:window.location.origin});
    forgot.disabled=false;forgot.textContent=error?'Try again':'Check your email ✓';
  },style:{background:'none',border:'none',fontSize:'13px',color:C.textM,fontFamily:SS,textDecoration:'underline',textAlign:'right',marginBottom:'24px',alignSelf:'flex-end'}});
  forgot.textContent='Forgot password?';
  wrap.appendChild(forgot);

  wrap.appendChild(d({style:{flex:'1',minHeight:'24px'}}));

  const loginBtn=primBtn('Sign in',async()=>{
    errBox.innerHTML='';emailF._err('');passF._err('');
    if(!eV.trim()){emailF._err('Email is required');return;}
    if(!pV){passF._err('Password is required');return;}
    loginBtn.setLoading(true);
    const{data,error}=await supa.auth.signInWithPassword({email:eV.trim(),password:pV});
    loginBtn.setLoading(false);
    if(error){
      errBox.innerHTML='';
      errBox.appendChild(errorBanner(error.message==='Invalid login credentials'?'Incorrect email or password. Please try again.':error.message));
      return;
    }
    state.session=data.session;
    localStorage.setItem('aevi_token',data.session.access_token);
    const u=await load('av_u');
    if(u){state.user=u;go('home','sR');}
    else{go('onboarding','sR');}
  });
  wrap.appendChild(loginBtn);
  wrap.appendChild(d({style:{height:'14px'}}));
  const sw=p({style:{textAlign:'center',fontSize:'13px',color:C.textM,fontFamily:SS}});
  sw.innerHTML=`Don't have an account? <span onclick="go('signup','sR')" style="color:${C.dark};font-weight:600;cursor:pointer;text-decoration:underline">Sign up</span>`;
  wrap.appendChild(sw);
  sc.appendChild(wrap);return sc;
}

/* ══════════════════════════════
   SIGNUP
══════════════════════════════ */
function signup(){
  const sc=d({class:'screen',style:{overflowY:'auto'}});
  const wrap=d({style:{padding:'60px 24px 48px',display:'flex',flexDirection:'column',flex:'1'}});
  wrap.appendChild(backBtn('welcome'));
  wrap.appendChild(h(2,{style:{fontFamily:SF,fontSize:'52px',fontWeight:'500',color:C.dark,lineHeight:'1.0',marginBottom:'10px'}},'Create your\nprivate space'));
  wrap.appendChild(p({style:{fontSize:'15px',color:C.textM,lineHeight:'1.6',marginBottom:'36px',fontFamily:SS}},'Your thoughts stay here. Always.'));

  let nV='',eV='',pV='';
  const errBox=d({style:{marginBottom:'4px'}});wrap.appendChild(errBox);
  const nameF=inputField('YOUR NAME','text','What should I call you?',v=>nV=v);
  const emailF=inputField('EMAIL','email','you@example.com',v=>eV=v);
  const passF=inputField('PASSWORD','password','At least 8 characters',v=>pV=v);
  wrap.append(nameF,emailF,passF);
  wrap.appendChild(d({style:{flex:'1',minHeight:'24px'}}));

  const signupBtn=primBtn('Create account',async()=>{
    errBox.innerHTML='';nameF._err('');emailF._err('');passF._err('');
    let valid=true;
    if(!nV.trim()){nameF._err('Name is required');valid=false;}
    if(!eV.trim()||!eV.includes('@')){emailF._err('Valid email is required');valid=false;}
    if(pV.length<8){passF._err('Password must be at least 8 characters');valid=false;}
    if(!valid)return;

    signupBtn.setLoading(true);
    const{data,error}=await supa.auth.signUp({
      email:eV.trim(),password:pV,
      options:{data:{full_name:nV.trim()}},
    });
    signupBtn.setLoading(false);

    if(error){
      errBox.innerHTML='';
      errBox.appendChild(errorBanner(error.message));
      return;
    }

    state.user.name=nV.trim();
    // If email confirmation required
    if(!data.session){
      // Show confirmation message
      wrap.innerHTML='';
      wrap.appendChild(d({style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 24px',textAlign:'center'}}));
      const conf=wrap.firstChild;
      conf.appendChild(d({style:{fontSize:'48px',marginBottom:'24px'}},'✉'));
      conf.appendChild(h(2,{style:{fontFamily:SF,fontSize:'40px',fontStyle:'italic',color:C.dark,marginBottom:'12px',fontWeight:'400'}},'Check your email'));
      conf.appendChild(p({style:{fontSize:'15px',color:C.textM,lineHeight:'1.7',fontFamily:SS,maxWidth:'280px'}},`We sent a confirmation link to ${eV.trim()}. Click it to activate your account.`));
      conf.appendChild(d({style:{height:'32px'}}));
      conf.appendChild(b({onClick:()=>go('login','sR'),style:{padding:'14px 28px',borderRadius:'14px',background:C.dark,color:'#FFF',fontSize:'14px',fontWeight:'600',fontFamily:SS}},'Back to sign in'));
      return;
    }

    state.session=data.session;
    localStorage.setItem('aevi_token',data.session.access_token);
    go('onboarding','sR');
  });
  wrap.appendChild(signupBtn);
  wrap.appendChild(d({style:{height:'14px'}}));
  const note=p({style:{textAlign:'center',fontSize:'12px',color:C.textH,fontFamily:SS}});
  note.innerHTML=`By continuing you agree to our <span style="color:${C.dark};text-decoration:underline;cursor:pointer">Privacy Policy</span>`;
  wrap.appendChild(note);
  wrap.appendChild(d({style:{height:'10px'}}));
  const sw=p({style:{textAlign:'center',fontSize:'13px',color:C.textM,fontFamily:SS}});
  sw.innerHTML=`Already have an account? <span onclick="go('login','sL')" style="color:${C.dark};font-weight:600;cursor:pointer;text-decoration:underline">Sign in</span>`;
  wrap.appendChild(sw);
  sc.appendChild(wrap);return sc;
}

  const sc=d({class:'screen',style:{overflowY:'auto'}});

  wrap.appendChild(p({style:{fontSize:'15px',color:C.textM,lineHeight:'1.6',marginBottom:'32px',fontFamily:SS}},"I'll shape how I think around your goal."));
  let sel='';
  const goals=[
    {id:'reflect',icon:'◎',label:'Self-reflection',sub:'Process thoughts and understand myself'},
    {id:'decide',icon:'⊙',label:'Better decisions',sub:'Think through choices with clarity'},
    {id:'create',icon:'✦',label:'Creative writing',sub:'Turn raw ideas into polished content'},
    {id:'journal',icon:'◇',label:'Daily journaling',sub:'Build a consistent reflection habit'},
  ];
  const cards=goals.map(g=>{
    const card=b({style:{width:'100%',padding:'18px 20px',borderRadius:'16px',border:`1px solid ${C.border}`,background:C.card,textAlign:'left',marginBottom:'10px',display:'flex',alignItems:'center',gap:'16px',boxShadow:'0 1px 4px rgba(0,0,0,0.04)',transition:'all .15s'}});
    const ico=d({style:{width:'48px',height:'48px',borderRadius:'14px',background:'#F4F1EB',border:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',color:C.textM,flexShrink:'0',transition:'all .15s'}},g.icon);
    const txt=d({style:{flex:'1'}});
    txt.appendChild(d({style:{fontSize:'15px',fontWeight:'600',color:C.dark,marginBottom:'3px',fontFamily:SS}},g.label));
    txt.appendChild(d({style:{fontSize:'13px',color:C.textM,lineHeight:'1.4',fontFamily:SS}},g.sub));
    const chk=d({style:{width:'24px',height:'24px',borderRadius:'50%',border:`1.5px solid ${C.border}`,flexShrink:'0',transition:'all .15s',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',color:'transparent'}});
    card.append(ico,txt,chk);

}
