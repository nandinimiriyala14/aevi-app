<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Aevi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background-color: #FDF6F0;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .wordmark {
      font-size: 13px;
      font-family: Georgia, serif;
      font-style: italic;
      letter-spacing: 0.22em;
      color: #3D2B2B;
      text-transform: lowercase;
      margin-bottom: 6px;
    }

    .subtitle {
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 2px;
      color: #A08888;
      text-transform: uppercase;
      margin-bottom: 44px;
    }

    .divider-top {
      width: 32px;
      height: 1px;
      background-color: rgba(134, 112, 112, 0.25);
      margin-bottom: 44px;
    }

    .heading {
      font-size: clamp(26px, 6vw, 32px);
      font-weight: normal;
      color: #3D2B2B;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 32px;
      font-style: italic;
    }

    /* Form */
    .form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: left;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #9a7878;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #D5B4B4;
      border-radius: 12px;
      background-color: #FFFFFF;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: 15px;
      color: #3D2B2B;
      outline: none;
      transition: border-color 0.18s ease;
      -webkit-appearance: none;
    }

    .field input::placeholder {
      color: #C4A8A8;
    }

    .field input:focus {
      border-color: #B09090;
    }

    .btn {
      width: 100%;
      margin-top: 6px;
      padding: 16px;
      background-color: #867070;
      color: #FFFFFF;
      border: none;
      border-radius: 24px;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background-color 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover {
      background-color: #7a6464;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    /* Feedback */
    .feedback {
      margin-top: 20px;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
      display: none;
    }

    .feedback.error {
      color: #867070;
    }

    .feedback.success {
      color: #A08888;
    }

    /* Success state — replaces the form */
    .success-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
    }

    .sparkle {
      font-size: 22px;
      color: #9a7878;
      margin-bottom: 20px;
      display: block;
      line-height: 1;
    }

    .success-heading {
      font-size: clamp(24px, 5vw, 30px);
      font-weight: normal;
      font-style: italic;
      color: #3D2B2B;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .success-sub {
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: #9a7878;
      line-height: 1.65;
    }

    .divider-bottom {
      width: 32px;
      height: 1px;
      background-color: rgba(134, 112, 112, 0.25);
      margin-top: 36px;
    }

    /* Spinner inside button */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #FFFFFF;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="wordmark">aevi</p>
    <p class="subtitle">Your private AI companion</p>
    <div class="divider-top"></div>

    <!-- Form state -->
    <div id="form-state" style="width:100%; display:flex; flex-direction:column; align-items:center;">
      <h1 class="heading">Reset your password.</h1>

      <form class="form" id="reset-form" onsubmit="handleSubmit(event)">
        <div class="field">
          <label for="new-password">New Password</label>
          <input
            type="password"
            id="new-password"
            placeholder="At least 8 characters"
            autocomplete="new-password"
            required
            minlength="8"
          />
        </div>
        <div class="field">
          <label for="confirm-password">Confirm Password</label>
          <input
            type="password"
            id="confirm-password"
            placeholder="Repeat your password"
            autocomplete="new-password"
            required
            minlength="8"
          />
        </div>
        <button class="btn" type="submit" id="submit-btn">Set new password</button>
      </form>

      <p class="feedback error" id="error-msg"></p>
    </div>

    <!-- Success state -->
    <div class="success-state" id="success-state">
      <span class="sparkle">✦</span>
      <h2 class="success-heading">Password updated.</h2>
      <p class="success-sub">Open the Aevi app to sign in.</p>
      <div class="divider-bottom"></div>
    </div>
  </div>

  <!-- Supabase JS (ESM via CDN) -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL  = 'https://safywvodxfioxppvnrug.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhZnl3dm9keGZpb3hwcHZucnVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTcxNTQsImV4cCI6MjA5MTkzMzE1NH0.e6O3WLeCzXzmbDsAtx6s1Iv0SidgNB5KV9GMHp7qD9I';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

    // Parse access_token + refresh_token from URL hash
    // Supabase sends: #access_token=...&refresh_token=...&type=recovery
    function parseHash() {
      const hash = window.location.hash.slice(1); // strip leading #
      const params = new URLSearchParams(hash);
      return {
        accessToken:  params.get('access_token'),
        refreshToken: params.get('refresh_token'),
        type:         params.get('type'),
      };
    }

    const { accessToken, refreshToken, type } = parseHash();

    // If no valid recovery token, show an error immediately
    if (!accessToken || type !== 'recovery') {
      showError('This link is invalid or has expired. Please request a new password reset.');
    } else {
      // Establish the session from the recovery tokens so updateUser works
      supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken ?? '' })
        .then(({ error }) => {
          if (error) showError('This link has expired. Please request a new password reset.');
        });
    }

    window.handleSubmit = async function (e) {
      e.preventDefault();
      clearError();

      const newPw      = document.getElementById('new-password').value;
      const confirmPw  = document.getElementById('confirm-password').value;

      if (newPw !== confirmPw) {
        showError("Passwords don't match. Please try again.");
        return;
      }

      if (newPw.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }

      setLoading(true);

      const { error } = await supabase.auth.updateUser({ password: newPw });

      setLoading(false);

      if (error) {
        showError(error.message || 'Something went wrong. Please try again.');
      } else {
        showSuccess();
      }
    };

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function clearError() {
      const el = document.getElementById('error-msg');
      el.textContent = '';
      el.style.display = 'none';
    }

    function showSuccess() {
      document.getElementById('form-state').style.display   = 'none';
      document.getElementById('success-state').style.display = 'flex';
    }

    function setLoading(loading) {
      const btn = document.getElementById('submit-btn');
      if (loading) {
        btn.disabled   = true;
        btn.innerHTML  = '<span class="spinner"></span>Updating…';
      } else {
        btn.disabled   = false;
        btn.innerHTML  = 'Set new password';
      }
    }
  </script>
</body>
</html>
